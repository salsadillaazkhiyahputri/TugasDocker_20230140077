<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Input Data Mahasiswa</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f8f9fa; display: flex; justify-content: center; padding: 40px; }
        .form-container { background: white; padding: 40px; border-radius: 15px; box-shadow: 0 4px 20px rgba(0,0,0,0.08); width: 100%; max-width: 500px; }
        h2 { color: #333; margin-top: 0; border-left: 5px solid #1a73e8; padding-left: 15px; }
        .form-group { margin-bottom: 20px; }
        label { display: block; margin-bottom: 8px; font-weight: 600; color: #555; }
        input, select { width: 100%; padding: 12px; border: 1.5px solid #eee; border-radius: 8px; box-sizing: border-box; transition: 0.3s; }
        input:focus { border-color: #1a73e8; outline: none; background: #fbfcfe; }
        .btn-group { display: flex; gap: 10px; margin-top: 30px; }
        .btn-save { flex: 2; background: #1a73e8; color: white; border: none; padding: 12px; border-radius: 8px; cursor: pointer; font-weight: bold; }
        .btn-back { flex: 1; background: #eee; color: #555; text-decoration: none; padding: 12px; border-radius: 8px; text-align: center; font-size: 0.9rem; }
        .btn-save:hover { background: #1557b0; }
        .identity { margin-top: 25px; font-size: 0.8rem; color: #bbb; text-align: center; }
    </style>
</head>
<body>
<div class="form-container">
    <h2>Input Data</h2>
    <form th:action="@{/save}" th:object="${user}" method="post">
        <div class="form-group">
            <label>Nomor Induk Mahasiswa (NIM)</label>
            <input type="text" th:field="*{nim}" placeholder="Contoh: 20210140xxx" required>
        </div>
        <div class="form-group">
            <label>Nama Lengkap</label>
            <input type="text" th:field="*{nama}" placeholder="Masukkan nama mahasiswa" required>
        </div>
        <div class="form-group">
            <label>Jenis Kelamin</label>
            <select th:field="*{jenisKelamin}">
                <option value="Laki-laki">Laki-laki</option>
                <option value="Perempuan">Perempuan</option>
            </select>
        </div>
        <div class="btn-group">
            <button type="submit" class="btn-save">Simpan Data</button>
            <a th:href="@{/home}" class="btn-back">Kembali</a>
        </div>
    </form>
</div>
</body>
</html>
