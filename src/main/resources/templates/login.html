<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Login - Sistem Mahasiswa</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #f0f2f5; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .login-card { background: white; padding: 2rem; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); width: 350px; text-align: center; }
        h2 { color: #1a73e8; margin-bottom: 1.5rem; }
        input { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ddd; border-radius: 6px; box-sizing: border-box; }
        button { width: 100%; padding: 12px; background: #1a73e8; color: white; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; transition: 0.3s; }
        button:hover { background: #1557b0; }
        .footer { margin-top: 20px; font-size: 0.8rem; color: #666; border-top: 1px solid #eee; pt: 10px; }
    </style>
</head>
<body>
<div class="login-card">
    <h2>Portal Akademik</h2>
    <form th:action="@{/login}" method="post">
        <input type="text" name="username" placeholder="Username (admin)" required>
        <input type="password" name="password" placeholder="Password (NIM)" required>
        <button type="submit">Log In</button>
    </form>
    <div th:if="${error}" style="color: #d93025; font-size: 0.9rem; margin-top: 10px;" th:text="${error}"></div>
    <div class="footer">
        <p><strong>Salsa Dilla Azkhiyah Putri</strong><br>20230140077</p>
    </div>
</div>
</body>
</html>
